version: "3.8"
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=tni12345
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=unfoaled-miles-triweekly.ngrok-free.dev/
      - WEBHOOK_URL=https://unfoaled-miles-triweekly.ngrok-free.dev/
      - TZ=Asia/Bangkok
      # 1. กำหนด Path ที่ n8n อนุญาตให้เข้าถึงได้
      - N8N_FILESYSTEM_ALLOWED_PATHS=/home/node/.n8n-files:/files
      - N8N_FILESYSTEM_ALLOW_LIST=/files/
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./files:/files
      - ./n8n_files:/home/node/.n8n-files
    restart: always

  dashboard:
    image: nginx:alpine
    container_name: customer-dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard/public:/usr/share/nginx/html:ro
    restart: always